name: CI Image

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests and package
        run: ./mvnw package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/enterprise-rag-demo-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  build-and-push:
    name: Build image and update GitOps manifest
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Prepare image names
        run: |
          echo "GHCR_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "ACR_IMAGE_NAME=crpi-y9knyaepfs2bdt4q.cn-hangzhou.personal.cr.aliyuncs.com/fanslin-namespace/cn.fanslin" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-y9knyaepfs2bdt4q.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE_NAME }}:latest
            ${{ env.ACR_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kind manifest image
        run: |
          sed -i.bak "s|image: .*|image: ${GHCR_IMAGE_NAME}:${IMAGE_TAG}|" k8s/kind/deployment.yaml
          sed -i.bak "s|image: .*|image: ${ACR_IMAGE_NAME}:${IMAGE_TAG}|" k8s/ack/deployment.yaml
          rm k8s/kind/deployment.yaml.bak
          rm k8s/ack/deployment.yaml.bak
          git diff -- k8s/kind/deployment.yaml k8s/ack/deployment.yaml

      - name: Commit GitOps manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kind/deployment.yaml k8s/ack/deployment.yaml
          git commit -m "chore: deploy ${GITHUB_SHA::7} [skip ci]"
          git push
