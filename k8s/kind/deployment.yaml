apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-demo
  namespace: enterprise-rag
  labels:
    app: enterprise-rag-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-demo
  template:
    metadata:
      labels:
        app: enterprise-rag-demo
    spec:
      containers:
        - name: enterprise-rag-demo
          image: ghcr.io/fanslin/enterprise-rag-demo:sha-0b15688e2da2eed94e3e4fa6d216bc877c919882
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: enterprise-rag-config
            - secretRef:
                name: enterprise-rag-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health/ai
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health/ai
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
