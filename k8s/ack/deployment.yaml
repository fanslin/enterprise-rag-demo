apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-demo
  namespace: enterprise-rag
  labels:
    app: enterprise-rag-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-demo
  template:
    metadata:
      labels:
        app: enterprise-rag-demo
    spec:
      containers:
        - name: enterprise-rag-demo
          image: crpi-y9knyaepfs2bdt4q.cn-hangzhou.personal.cr.aliyuncs.com/fanslin-namespace/cn.fanslin:sha-feb614b475aced7ec653972607aa72a9f28f4bce
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: APP_RAG_TOP_K
              value: "4"
            - name: APP_RAG_SIMILARITY_THRESHOLD
              value: "0.0"
          readinessProbe:
            httpGet:
              path: /api/health/ai
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health/ai
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
